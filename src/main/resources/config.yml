settings:
  # Cancel NATURAL / JOCKEY / PATROL mob spawns inside arena lobby or gameplay cuboids.
  block-natural-spawns-in-arenas: true
  default-countdown-seconds: 10
  default-cage-seconds: 5
  default-pre-border-delay-seconds: 30
  default-border-shrink-seconds: 120
  default-end-border-diameter: 12.0
  fake-border:
    outside-damage:
      # Damage is applied to alive players outside the shrinking match border.
      period-ticks: 10
      amount: 1.0
  default-lava-enabled: false
  default-lava-start-delay-seconds: 90
  default-lava-rise-interval-seconds: 10
  default-post-shrink-end-delay-seconds: 30
  default-min-players: 2
  default-min-filled-teams: 2
  default-allow-place-blocks: true
  default-allow-break-original-blocks: false
  default-allow-break-player-blocks: true
  default-allow-smooth-fall: false
  default-smooth-fall-seconds: 10
  default-friendly-fire: false
  default-loot-enabled: true
  default-loot-interval-seconds: 8
  default-loot-blacklist-mode: false
  default-loot-whitelist: []
  # Blacklist loot mode only: material names to exclude from rolls (e.g. BEDROCK, COMMAND_BLOCK). Empty = no exclusions except spawn/potion/book toggles below.
  default-loot-blacklist: []
  default-celebration-seconds: 10
  default-victory-effect:
    shape: square
    radius: 16.0
    interval-ticks: 20
    spawn-height: 18.0
    amount-per-wave: 2
  # Console commands after a win; run once per player on the winning team. Placeholders: %player%, {player}, %uuid%, %arena%, %team%
  default-victory-commands: []
  default-allowed-commands:
    - "msg"
    - "r"
  waiting-items:
    team-selector:
      # Hotbar slot 0..8
      slot: 4
      name: "&aTeam Selector"
      lore:
        - "&7Right click to choose your team."
        - "&8Waiting lobby only"
    leave-arena:
      # Hotbar slot 0..8
      slot: 8
      name: "&cLeave Arena"
      lore:
        - "&7Right click to leave waiting queue."
        - "&8Waiting lobby only"
  timer-sounds:
    start-sound:
      name: "BLOCK_NOTE_BLOCK_PLING"
      volume: 1.2
      pitch: 1.0
    tick-sound:
      name: "BLOCK_NOTE_BLOCK_HAT"
      volume: 1.0
      pitch: 1.4
    game-start-sound:
      name: "ENTITY_PLAYER_LEVELUP"
      volume: 1.0
      pitch: 1.0
    cancel-sound:
      name: "BLOCK_NOTE_BLOCK_BASS"
      volume: 1.0
      pitch: 0.8
  global-spawn:
    world: "World"
    x: 0.0
    y: 69.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0

paths:
  arenas-folder: "arenas"
  cages-folder: "cages"
  cosmetics-folder: "cosmetics"
  kits-folder: "kits"
  snapshots-folder: "snapshots"
  arena-edit-backups-folder: "arena-edit-backups"
